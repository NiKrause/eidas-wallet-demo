name: 🧪 E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Install Playwright Chromium
        run: npx playwright install chromium

      - name: 🧪 Run E2E tests
        id: tests
        continue-on-error: true
        run: |
          # Run tests — JSON is written to test-results.json by the reporter config,
          # list output goes to stdout for real-time log viewing
          npx playwright test --reporter=json,list 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          # Verify the JSON file exists
          if [ -f test-results.json ]; then
            echo "✅ test-results.json found ($(wc -c < test-results.json) bytes)"
          else
            echo "⚠️ test-results.json not found — checking alternate locations..."
            find . -name "test-results.json" -type f 2>/dev/null
          fi

      - name: 📊 Generate test summary
        if: always()
        run: |
          # Copy test output to root if it's in tests/ subdir
          if [ -f tests/test-output.json ]; then
            cp tests/test-output.json test-output.json
            echo "📄 Copied from tests/test-output.json"
          fi
          python3 scripts/generate_test_summary.py

      - name: 📋 Post test summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('test_summary.md')) {
              const summary = fs.readFileSync('test_summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: ❌ Fail on test failure
        if: steps.tests.outputs.exit_code != '0'
        run: |
          echo "❌ Some tests failed!"
          exit 1

      - name: ✅ All tests passed
        if: steps.tests.outputs.exit_code == '0'
        run: echo "## ✅ All tests passed! 🎉" >> $GITHUB_STEP_SUMMARY
