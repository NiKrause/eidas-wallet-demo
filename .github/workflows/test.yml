name: 🧪 E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Install Playwright Chromium
        run: npx playwright install chromium

      - name: 🧪 Run E2E tests
        id: tests
        continue-on-error: true
        run: |
          npx playwright test --reporter=json 2>/dev/null | tee test-output.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: 📊 Generate test summary
        if: always()
        run: python3 scripts/generate_test_summary.py

      - name: 📸 Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: 📋 Post test summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('test_summary.md')) {
              const summary = fs.readFileSync('test_summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: ❌ Fail on test failure
        if: steps.tests.outputs.exit_code != '0'
        run: echo "❌ Some tests failed!" && exit 1

      - name: ✅ All tests passed
        if: steps.tests.outputs.exit_code == '0'
        run: echo "## ✅ All tests passed! 🎉" >> $GITHUB_STEP_SUMMARY
